services:
  # ─── Database (MongoDB) ─────────────────────────────────────────────────────
  mongodb:
    image: mongo:6.0
    container_name: drivest-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-admin_password}
      MONGO_INITDB_DATABASE: ${DB_NAME:-drivest_db}
    volumes:
      - mongodb_data:/data/db
    networks:
      - drivest-network
    # Port 27017 is not exposed to the host for production security; Nginx or internal containers query internally.
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Express Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: drivest-backend
    restart: unless-stopped
    environment:
      PORT: 5001
      MONGODB_URI: ${MONGODB_URI:-mongodb://admin:admin_password@mongodb:27017/drivest_db?authSource=admin}
      DB_NAME: ${DB_NAME:-drivest_db}
      JWT_SECRET_TOKEN: ${JWT_SECRET_TOKEN:-drivest_jwt_secret_token_default_value_for_docker}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      JWT_REFRESH_TOKEN: ${JWT_REFRESH_TOKEN:-drivest_jwt_refresh_token_default_value_for_docker}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-dummy_client_id}
      CLOUD_NAME: ${CLOUD_NAME:-dummy_cloud_name}
      CLOUD_API_KEY: ${CLOUD_API_KEY:-dummy_cloud_api_key}
      CLOUD_API_SECRET: ${CLOUD_API_SECRET:-dummy_cloud_api_secret}
      PUSHER_APP_ID: ${PUSHER_APP_ID:-dummy_pusher_app_id}
      PUSHER_KEY: ${PUSHER_KEY:-dummy_pusher_key}
      PUSHER_SECRET: ${PUSHER_SECRET:-dummy_pusher_secret}
      PUSHER_CLUSTER: ${PUSHER_CLUSTER:-eu}
      PUSHER_USE_TLS: ${PUSHER_USE_TLS:-true}
      FIREBASE_SERVICE_ACCOUNT_B64: ${FIREBASE_SERVICE_ACCOUNT_B64:-}
      EMAIL_USER: ${EMAIL_USER:-dummy_email@gmail.com}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-dummy_email_password}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_dummy_stripe_secret_key_so_app_does_not_crash_at_startup}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID:-price_dummy_stripe_price_id}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_dummy_stripe_webhook_secret}
      RAPIDAPI_HOST: ${RAPIDAPI_HOST:-dummy_rapidapi_host}
      RAPIDAPI_KEY: ${RAPIDAPI_KEY:-dummy_rapidapi_key}
      PYTHON_API_URL: http://ai:8000
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    networks:
      - drivest-network
    depends_on:
      mongodb:
        condition: service_healthy

  # ─── FastAPI / AI Service ───────────────────────────────────────────────────
  ai:
    build:
      context: ./ai-part
      dockerfile: Dockerfile
    container_name: drivest-ai
    restart: unless-stopped
    environment:
      PORT: 8000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL_NAME: ${OPENAI_MODEL_NAME:-gpt-4o-mini}
      NODE_API_URL: http://backend:5001/ai/import-cars
    volumes:
      - ai_logs:/app/logs
      - ai_data:/app/data
    networks:
      - drivest-network
    depends_on:
      backend:
        condition: service_started

  # ─── Next.js Standalone Frontend ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost/api}
        NEXT_PUBLIC_PUSHER_KEY: ${NEXT_PUBLIC_PUSHER_KEY}
        NEXT_PUBLIC_PUSHER_CLUSTER: ${NEXT_PUBLIC_PUSHER_CLUSTER:-eu}
    container_name: drivest-frontend
    restart: unless-stopped
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
    networks:
      - drivest-network
    depends_on:
      backend:
        condition: service_started

  # ─── Nginx Reverse Proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: drivest-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - drivest-network
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started

volumes:
  mongodb_data:
  backend_uploads:
  backend_logs:
  ai_logs:
  ai_data:

networks:
  drivest-network:
    driver: bridge
